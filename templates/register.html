{% extends 'base.html' %}
{% block title %}Register - HCN{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/static/images/logo.png" alt="HCN">
    </div>
    <h2>Create Account</h2>
    <p class="auth-sub">Join HCN for the best cleaning products</p>
    <div id="authError" class="auth-error" style="display:none;"></div>
    <div class="auth-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Enter your full name">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="regPhone" placeholder="+91 XXXXX XXXXX">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pass-wrap">
          <input type="password" id="regPass" placeholder="Create a password">
          <button type="button" onclick="togglePass('regPass')"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="pass-wrap">
          <input type="password" id="regPass2" placeholder="Confirm your password">
          <button type="button" onclick="togglePass('regPass2')"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <button class="btn-primary btn-full" onclick="doRegister()">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </div>
    <p class="auth-switch">Already have an account? <a href="/login">Login here</a></p>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const password = document.getElementById('regPass').value;
  const password2 = document.getElementById('regPass2').value;
  if (!name || !email || !password) { showErr('Please fill in all required fields'); return; }
  if (password !== password2) { showErr('Passwords do not match'); return; }
  if (password.length < 6) { showErr('Password must be at least 6 characters'); return; }
  try {
    const res = await fetch('/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, email, phone, password})
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = data.redirect || '/account';
    } else {
      showErr(data.error || 'Registration failed');
    }
  } catch(e) { showErr('Network error. Please try again.'); }
}
function showErr(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.style.display = 'block';
}
function togglePass(id) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
