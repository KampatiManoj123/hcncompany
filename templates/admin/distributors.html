{% extends 'admin/base.html' %}
{% block title %}Distributors - HCN Admin{% endblock %}
{% block page_title %}Distributor Applications{% endblock %}
{% block content %}

<div class="card">
  <div class="card-header">
    <h3><i class="fas fa-store" style="color:var(--green);"></i> Distributor Applications</h3>
    <div style="display:flex;gap:8px;">
      <select id="filterStatus" onchange="loadDistributors()" style="padding:7px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:0.85rem;">
        <option value="">All Status</option>
        <option value="Pending">Pending</option>
        <option value="Approved">Approved</option>
        <option value="Rejected">Rejected</option>
        <option value="Contacted">Contacted</option>
      </select>
    </div>
  </div>
  <div id="distributorsList" style="padding:8px 0;"></div>
</div>

<!-- Detail Modal -->
<div class="admin-modal-overlay" id="distDetailModal" style="display:none;">
  <div class="admin-modal" style="max-width:680px;">
    <div class="admin-modal-header">
      <h3>Distributor Application Details</h3>
      <button onclick="closeDistModal()"><i class="fas fa-times"></i></button>
    </div>
    <div id="distDetailContent" style="padding:24px;"></div>
    <div style="padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn-sm btn-blue" onclick="updateDistStatus('Contacted')"><i class="fas fa-phone"></i> Mark Contacted</button>
      <button class="btn-sm" style="background:#22c55e;color:#fff;" onclick="updateDistStatus('Approved')"><i class="fas fa-check"></i> Approve</button>
      <button class="btn-sm" style="background:#ef4444;color:#fff;" onclick="updateDistStatus('Rejected')"><i class="fas fa-times"></i> Reject</button>
    </div>
  </div>
</div>

{% endblock %}
{% block extra_js %}
<script>
let currentDistId = null;

async function loadDistributors() {
  const status = document.getElementById('filterStatus').value;
  const res = await fetch('/api/distributors');
  let apps = await res.json();
  if (status) apps = apps.filter(a => a.status === status);
  const el = document.getElementById('distributorsList');
  if (!apps.length) {
    el.innerHTML = '<p style="text-align:center;padding:40px;color:#999;">No applications found.</p>';
    return;
  }
  el.innerHTML = `<div style="overflow-x:auto;"><table>
    <thead><tr><th>App ID</th><th>Shop Name</th><th>Owner</th><th>City</th><th>Phone</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${apps.map(a => `
      <tr>
        <td><b style="color:var(--blue);">${a.app_id}</b></td>
        <td><b>${a.shop_name}</b></td>
        <td>${a.owner_name}</td>
        <td>${a.city}, ${a.state}</td>
        <td><a href="tel:${a.phone}">${a.phone}</a></td>
        <td>${new Date(a.created_at?.$date||a.created_at).toLocaleDateString('en-IN')}</td>
        <td><span class="status-badge ${(a.status||'').toLowerCase()}">${a.status}</span></td>
        <td><button class="btn-sm btn-blue" onclick="viewDist('${a.app_id}')"><i class="fas fa-eye"></i> View</button></td>
      </tr>`).join('')}
    </tbody></table></div>`;
}

async function viewDist(appId) {
  const res = await fetch('/api/distributors');
  const apps = await res.json();
  const app = apps.find(a => a.app_id === appId);
  if (!app) return;
  currentDistId = appId;
  document.getElementById('distDetailContent').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div><h4 style="color:var(--blue);margin-bottom:12px;">Shop Details</h4>
        <p><b>Shop Name:</b> ${app.shop_name}</p>
        <p><b>Shop Type:</b> ${app.shop_type||'-'}</p>
        <p><b>GST:</b> ${app.gst_number||'-'}</p>
        <p><b>Monthly Volume:</b> ${app.monthly_volume||'-'}</p>
        <p><b>Experience:</b> ${app.experience||'-'}</p>
      </div>
      <div><h4 style="color:var(--blue);margin-bottom:12px;">Contact Details</h4>
        <p><b>Owner:</b> ${app.owner_name}</p>
        <p><b>Email:</b> <a href="mailto:${app.email}">${app.email}</a></p>
        <p><b>Phone:</b> <a href="tel:${app.phone}">${app.phone}</a></p>
        <p><b>WhatsApp:</b> ${app.whatsapp||'-'}</p>
      </div>
      <div style="grid-column:1/-1;"><h4 style="color:var(--blue);margin-bottom:8px;">Address</h4>
        <p>${app.address}, ${app.city}, ${app.state} - ${app.pincode}</p>
      </div>
      ${app.message ? `<div style="grid-column:1/-1;"><h4 style="color:var(--blue);margin-bottom:8px;">Message</h4><p>${app.message}</p></div>` : ''}
      <div style="grid-column:1/-1;">
        <b>Status:</b> <span class="status-badge ${(app.status||'').toLowerCase()}">${app.status}</span>
        <b style="margin-left:16px;">Applied:</b> ${new Date(app.created_at?.$date||app.created_at).toLocaleString('en-IN')}
      </div>
    </div>`;
  document.getElementById('distDetailModal').style.display = 'flex';
}

function closeDistModal() {
  document.getElementById('distDetailModal').style.display = 'none';
  currentDistId = null;
}

async function updateDistStatus(status) {
  if (!currentDistId) return;
  await fetch(`/api/distributors/${currentDistId}`, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({status})
  });
  closeDistModal();
  loadDistributors();
}

loadDistributors();
</script>
{% endblock %}
