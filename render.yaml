services:
  - type: web
    name: hcn-website
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: MONGO_URL
        sync: false
      - key: MONGO_DB_NAME
        value: hcn_db
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FLASK_ENV
        value: production
